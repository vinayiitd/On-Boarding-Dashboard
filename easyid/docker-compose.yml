# =============================================================================
# easyID · development stack
# One command: `docker compose up -d`
# =============================================================================

name: easyid

services:
  postgres:
    image: postgres:17-alpine
    container_name: easyid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-easyid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-easyid}
      POSTGRES_DB: ${POSTGRES_DB:-easyid}
      # Force the postgres process to log all statements at
      # `warning` level or above — matches production defaults.
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-easyid} -d ${POSTGRES_DB:-easyid}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      # Monorepo root — the API Dockerfile needs packages/domain for the
      # easyid-domain path dependency.
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: easyid-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-easyid}:${POSTGRES_PASSWORD:-easyid}@postgres:5432/${POSTGRES_DB:-easyid}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_LOG_LEVEL: ${API_LOG_LEVEL:-info}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3).status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: easyid-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      # Runtime env is baked at build time for Next.js public vars — the
      # image already knows it should hit `http://api:8000`.
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres-data:
    name: easyid-postgres-data
