[project]
name = "easyid-domain"
version = "0.1.0"
description = "easyID domain layer — entities, value objects, and pure business rules."
readme = "README.md"
requires-python = ">=3.13,<3.14"
license = { text = "Proprietary" }
authors = [{ name = "easyID" }]

# Zero runtime dependencies by design. The domain layer must stay
# framework-independent — no FastAPI, no SQLAlchemy, no Pydantic for
# entity modelling. Wire shapes live in the API's Pydantic models and
# are mirrored for the web in @easyid/types.
dependencies = []

[dependency-groups]
dev = [
    "pytest>=8.3.4",
    "ruff>=0.8.4",
    "mypy>=1.14.0",
]

[tool.uv]
package = true

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/easyid_domain"]

# ---------- Ruff -----------------------------------------------------------
[tool.ruff]
line-length = 100
target-version = "py313"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "N",
    "UP",
    "B",
    "A",
    "C4",
    "SIM",
    "PL",
    "RUF",
]
ignore = [
    "PLR2004",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "PLR2004"]
# Domain errors use Violation/Empty/Suspended names (not *Error) by design.
"src/easyid_domain/kernel/errors.py" = ["N818"]
"src/easyid_domain/organisation/errors.py" = ["N818"]

[tool.ruff.lint.isort]
known-first-party = ["easyid_domain"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ---------- mypy -----------------------------------------------------------
[tool.mypy]
python_version = "3.13"
files = ["src", "tests"]
strict = true
warn_unused_configs = true
warn_return_any = true
warn_unreachable = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
no_implicit_optional = true

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false

# ---------- Pytest ---------------------------------------------------------
[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
addopts = ["-ra", "--strict-markers", "--strict-config", "--tb=short"]
