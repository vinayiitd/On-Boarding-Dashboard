# =============================================================================
# Alembic configuration for easyID API.
# `sqlalchemy.url` is intentionally left blank — it is set at runtime from
# easyid_api.config.Settings.database_url in `alembic/env.py`.
# =============================================================================

[alembic]
script_location = alembic
prepend_sys_path = src
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]
hooks = ruff-format
ruff-format.type = console_scripts
ruff-format.entrypoint = ruff
ruff-format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
