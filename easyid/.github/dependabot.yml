version: 2
updates:
  - package-ecosystem: npm
    directory: /easyid
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      types:
        patterns: ["@types/*"]
      eslint:
        patterns: ["eslint*", "@typescript-eslint/*", "typescript-eslint"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*"]
      testing:
        patterns: ["vitest", "@vitest/*", "@testing-library/*", "happy-dom"]
      next:
        patterns: ["next", "eslint-config-next"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]

  - package-ecosystem: pip
    directory: /easyid/apps/api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: /easyid/apps/api
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: /easyid/apps/web
    schedule:
      interval: monthly

  - package-ecosystem: github-actions
    directory: /easyid
    schedule:
      interval: weekly
