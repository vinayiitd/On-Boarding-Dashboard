name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20.x"
  PNPM_VERSION: "10.4.0"
  PYTHON_VERSION: "3.13"

jobs:
  # -------------------------------------------------------------------------
  # Node / TypeScript
  # -------------------------------------------------------------------------
  node:
    name: Node · lint + typecheck + build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: easyid
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: easyid/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

  # -------------------------------------------------------------------------
  # Python / FastAPI
  # -------------------------------------------------------------------------
  api:
    name: API · ruff + mypy + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: easyid/apps/api
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: easyid
          POSTGRES_PASSWORD: easyid
          POSTGRES_DB: easyid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U easyid -d easyid"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      ENVIRONMENT: test
      API_LOG_LEVEL: warning
      DATABASE_URL: postgresql+asyncpg://easyid:easyid@127.0.0.1:5432/easyid
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.14"
          enable-cache: true
          cache-dependency-glob: |
            easyid/apps/api/uv.lock
            easyid/packages/domain/uv.lock

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync domain package
        working-directory: easyid/packages/domain
        run: uv sync --dev --frozen || uv sync --dev

      - name: Domain · ruff + mypy + pytest
        working-directory: easyid/packages/domain
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy
          uv run pytest -q

      - name: Sync API dependencies
        run: uv sync --dev --frozen || uv sync --dev

      - name: Ruff · lint
        run: uv run ruff check .

      - name: Ruff · format
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest -q

  # -------------------------------------------------------------------------
  # Docker build smoke — ensures the compose stack builds cleanly.
  # -------------------------------------------------------------------------
  docker:
    name: Docker · compose build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: easyid
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build images
        run: docker compose build --pull
